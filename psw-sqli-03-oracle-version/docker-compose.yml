name: psw-sqli-03-oracle-version

services:
  db:
    image: gvenzl/oracle-free:23-slim-faststart
    container_name: psw-sqli-03-oracle-version-db
    hostname: psw-sqli-03-oracle-version-db
    environment:
      - ORACLE_PASSWORD=labpassword
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 40
      start_period: 60s
    restart: "no"
    labels:
      - "lab.suite=portswigger"
      - "lab.topic=sql-injection"
      - "lab.id=psw-sqli-03-oracle-version"
      - "lab.component=database"
    networks:
      - psw-sqli-03-oracle-version-net

  web:
    build: .
    image: psw-sqli-03-oracle-version:latest
    container_name: psw-sqli-03-oracle-version
    hostname: psw-sqli-03-oracle-version
    ports:
      - "127.0.0.1:18003:8000"
    restart: "no"
    environment:
      - DJANGO_SETTINGS_MODULE=sqli_lab.settings
      - ORACLE_HOST=db
      - ORACLE_PORT=1521
      - ORACLE_SERVICE=FREEPDB1
      - ORACLE_USER=system
      - ORACLE_PASSWORD=labpassword
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "lab.suite=portswigger"
      - "lab.topic=sql-injection"
      - "lab.id=psw-sqli-03-oracle-version"
      - "lab.title=SQLi querying database version on Oracle"
      - "lab.component=web"
    networks:
      - psw-sqli-03-oracle-version-net

networks:
  psw-sqli-03-oracle-version-net:
    name: psw-sqli-03-oracle-version-net
    driver: bridge
