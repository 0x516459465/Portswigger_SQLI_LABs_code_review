name: psw-sqli-07-union-column-count

services:
  web:
    build: .
    image: psw-sqli-07-union-column-count:latest
    container_name: psw-sqli-07-union-column-count
    hostname: psw-sqli-07-union-column-count
    ports:
      - "127.0.0.1:18007:8000"
    restart: "no"
    environment:
      - DJANGO_SETTINGS_MODULE=sqli_lab.settings
    labels:
      - "lab.suite=portswigger"
      - "lab.topic=sql-injection"
      - "lab.id=psw-sqli-07-union-column-count"
      - "lab.title=SQLi UNION attack - determine number of columns"
    networks:
      - psw-sqli-07-union-column-count-net

networks:
  psw-sqli-07-union-column-count-net:
    name: psw-sqli-07-union-column-count-net
    driver: bridge
