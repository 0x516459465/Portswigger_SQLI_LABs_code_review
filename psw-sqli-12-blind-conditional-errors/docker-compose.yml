name: psw-sqli-12-blind-conditional-errors

services:
  web:
    build: .
    image: psw-sqli-12-blind-conditional-errors:latest
    container_name: psw-sqli-12-blind-conditional-errors
    hostname: psw-sqli-12-blind-conditional-errors
    ports:
      - "127.0.0.1:18012:8000"
    restart: "no"
    environment:
      - DJANGO_SETTINGS_MODULE=sqli_lab.settings
    labels:
      - "lab.suite=portswigger"
      - "lab.topic=sql-injection"
      - "lab.id=psw-sqli-12-blind-conditional-errors"
      - "lab.title=SQLi blind - conditional errors"
    networks:
      - psw-sqli-12-blind-conditional-errors-net

networks:
  psw-sqli-12-blind-conditional-errors-net:
    name: psw-sqli-12-blind-conditional-errors-net
    driver: bridge
