name: psw-sqli-15-time-delays-info-retrieval

services:
  db:
    image: postgres:16-alpine
    container_name: psw-sqli-15-time-delays-info-retrieval-db
    hostname: db
    environment:
      POSTGRES_DB: labdb
      POSTGRES_USER: labuser
      POSTGRES_PASSWORD: labpass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labuser -d labdb"]
      interval: 2s
      timeout: 3s
      retries: 15
    labels:
      - "lab.suite=portswigger"
      - "lab.topic=sql-injection"
      - "lab.id=psw-sqli-15-time-delays-info-retrieval"
      - "lab.role=database"
    networks:
      - psw-sqli-15-time-delays-info-retrieval-net

  web:
    build: .
    image: psw-sqli-15-time-delays-info-retrieval:latest
    container_name: psw-sqli-15-time-delays-info-retrieval
    hostname: psw-sqli-15-time-delays-info-retrieval
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:18015:8000"
    restart: "no"
    environment:
      - DJANGO_SETTINGS_MODULE=sqli_lab.settings
      - POSTGRES_DB=labdb
      - POSTGRES_USER=labuser
      - POSTGRES_PASSWORD=labpass
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    labels:
      - "lab.suite=portswigger"
      - "lab.topic=sql-injection"
      - "lab.id=psw-sqli-15-time-delays-info-retrieval"
      - "lab.title=SQLi blind - time delays with information retrieval"
    networks:
      - psw-sqli-15-time-delays-info-retrieval-net

networks:
  psw-sqli-15-time-delays-info-retrieval-net:
    name: psw-sqli-15-time-delays-info-retrieval-net
    driver: bridge
